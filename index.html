<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mitrawan | Software Engineer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0a0a0a; /* neutral-950 */
            color: #e5e5e5; /* neutral-200 */
        }

        .glass-panel {
            background: rgba(23, 23, 23, 0.5); /* neutral-900 */
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(38, 38, 38, 0.8); /* neutral-800 */
        }

        .timeline-dot {
            box-shadow: 0 0 0 4px #0a0a0a;
        }

        /* Subtle glow effect for text */
        .text-glow {
            text-shadow: 0 0 20px rgba(99, 102, 241, 0.3);
        }
    </style>
</head>
<body class="selection:bg-indigo-500/30 selection:text-indigo-200 antialiased">

    <!-- Top Navigation -->
    <nav class="fixed top-0 w-full glass-panel z-40 border-b-0 border-neutral-800/50">
        <div class="max-w-4xl mx-auto px-6 h-16 flex items-center justify-between">
            <div class="font-bold text-lg tracking-tight text-white flex items-center gap-2">
                <div class="w-2 h-2 rounded-full bg-indigo-500 animate-pulse"></div>
                Mitrawan.
            </div>
            <a href="mailto:emailkamu@domain.com" class="text-xs px-4 py-2 rounded-full border border-neutral-800 text-neutral-400 hover:text-white hover:border-neutral-600 transition-all hover:bg-neutral-800/50">
                Contact Me
            </a>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-6 pt-32 pb-24">
        
        <!-- Hero Section -->
        <header class="mb-24">
            <h1 class="text-5xl md:text-7xl font-extrabold tracking-tighter text-white mb-6 leading-tight">
                Software Engineer <br/>
                <span class="text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-cyan-400 text-glow">
                    Building Impact.
                </span>
            </h1>
            <p class="text-lg md:text-xl text-neutral-400 max-w-2xl leading-relaxed font-light">
                I architect scalable solutions and design systems that don't just look good, but solve actual business problems. Brutally honest, highly strategic.
            </p>
        </header>

        <!-- Experience Section -->
        <section>
            <div class="flex items-center gap-3 mb-12">
                <!-- Briefcase Icon -->
                <svg class="w-6 h-6 text-neutral-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                <h2 class="text-2xl font-bold tracking-tight text-white">Experience Record</h2>
            </div>

            <!-- Kontainer dimana JavaScript akan menyuntikkan data pengalaman -->
            <div id="experience-container" class="relative border-l border-neutral-800 ml-3 space-y-16">
                <!-- Data akan dimuat di sini oleh JavaScript -->
            </div>
        </section>
    </main>

    <!-- ========================================== -->
    <!-- 🔥 MITRAAA: EDIT DATA KAMU DI BAWAH INI 🔥 -->
    <!-- ========================================== -->
    <script>
        // Ini adalah "Database" kamu sekarang. Mudah, cepat, dan aman.
        // Jika ada pengalaman baru, cukup tambahkan block { ... } baru di dalam array ini.
        const DATA_PENGALAMAN = [
            {
                id: 1,
                posisi: "Senior Backend Engineer",
                perusahaan: "TechCorp Indonesia",
                periode: "Jan 2024 - Sekarang",
                lokasi: "Jakarta, Indonesia",
                deskripsi: "- Mengarsiteki ulang sistem microservices yang meningkatkan waktu respons API sebesar 40%.\n- Memimpin tim beranggotakan 5 engineer untuk peluncuran fitur payment gateway baru dalam waktu 2 bulan.\n- Mengurangi biaya server AWS sebesar $2000/bulan dengan optimasi query database.",
                fotoBukti: "https://images.unsplash.com/photo-1555066931-4365d14bab8c?q=80&w=1000&auto=format&fit=crop" // Ganti dengan link fotomu atau kosongkan ""
            },
            {
                id: 2,
                posisi: "Fullstack Web Developer",
                perusahaan: "Startup Digital Nusantara",
                periode: "Mar 2022 - Des 2023",
                lokasi: "Makassar, Sulawesi Selatan",
                deskripsi: "- Mengembangkan dashboard admin CMS internal menggunakan React dan Node.js yang digunakan oleh 50+ karyawan setiap hari.\n- Mengimplementasikan sistem autentikasi JWT dan Role-Based Access Control (RBAC).\n- Berhasil menangani lonjakan traffic hingga 10.000 concurrent users saat flash sale.",
                fotoBukti: "" // Dikosongkan jika tidak ada foto
            },
            {
                id: 3,
                posisi: "Junior Frontend Developer",
                perusahaan: "Creative Agency",
                periode: "Jul 2021 - Feb 2022",
                lokasi: "Remote",
                deskripsi: "- Membangun 10+ landing page interaktif dengan konversi tinggi menggunakan HTML, CSS, dan vanilla JavaScript.\n- Bekerja sama dengan tim UI/UX untuk memastikan desain pixel-perfect.",
                fotoBukti: "" 
            }
        ];

        // --- SISTEM RENDER OTOMATIS (Jangan ubah kode di bawah ini kecuali kamu paham) ---
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('experience-container');
            
            if (DATA_PENGALAMAN.length === 0) {
                container.innerHTML = `<div class="text-neutral-500 pl-8">Belum ada data pengalaman yang ditambahkan.</div>`;
                return;
            }

            let htmlContent = '';

            DATA_PENGALAMAN.forEach((item) => {
                // Memformat teks agar line break (\n) menjadi <br>
                const formattedDesc = item.deskripsi.replace(/\n/g, '<br/>');

                // Template Foto jika URL tersedia
                const photoTemplate = item.fotoBukti ? `
                    <div class="block overflow-hidden rounded-xl border border-neutral-800 bg-neutral-900 group-hover:border-neutral-700 transition-colors mt-2">
                        <img src="${item.fotoBukti}" alt="Ilustrasi ${item.posisi}" class="w-full h-auto object-cover opacity-70 group-hover:opacity-100 transition-opacity grayscale group-hover:grayscale-0 duration-500" loading="lazy" />
                    </div>
                ` : '';

                htmlContent += `
                    <div class="relative pl-8 md:pl-12 group">
                        <!-- Timeline Dot -->
                        <div class="absolute -left-[5px] top-2 w-[10px] h-[10px] rounded-full bg-neutral-800 group-hover:bg-indigo-500 transition-colors duration-300 timeline-dot"></div>
                        
                        <!-- Content Card -->
                        <div class="grid md:grid-cols-[1fr_250px] gap-8 items-start">
                            <div>
                                <h3 class="text-xl font-bold text-white mb-1 group-hover:text-indigo-400 transition-colors">${item.posisi}</h3>
                                <div class="flex flex-wrap items-center gap-4 text-sm text-neutral-400 mb-6">
                                    <span class="font-medium text-neutral-300">${item.perusahaan}</span>
                                    
                                    <span class="flex items-center gap-1">
                                        <!-- Calendar Icon -->
                                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                                        ${item.periode}
                                    </span>
                                    
                                    <span class="flex items-center gap-1">
                                        <!-- Map Pin Icon -->
                                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                                        ${item.lokasi}
                                    </span>
                                </div>
                                <p class="text-neutral-400 leading-relaxed font-light text-sm md:text-base">
                                    ${formattedDesc}
                                </p>
                            </div>

                            ${photoTemplate}
                        </div>
                    </div>
                `;
            });

            container.innerHTML = htmlContent;
        });
    </script>
</body>
</html>
